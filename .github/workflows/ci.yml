name: ci

on:
  push:
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}
  DOTNET_VERSION: '10.0.x'

jobs:
  # ---------- build + testes (todo push, qualquer branch) ----------
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read                         # restore do Fcg.Contracts exige token (feed NuGet não é anônimo)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      # autentica o source github-fcg com o GITHUB_TOKEN do runner
      - run: |
          dotnet nuget update source github-fcg \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --configfile nuget.config
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release
      # Testcontainers usa o Docker já presente no runner para subir RabbitMQ + Redis
      - run: dotnet test --no-build -c Release --collect:"XPlat Code Coverage"

  # ---------- publish da imagem (só na main, após os testes) ----------
  publish:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write                          # push no GHCR
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # o build faz restore autenticado do feed via secret mount (id casa com o Dockerfile)
          secrets: |
            gh_token=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
